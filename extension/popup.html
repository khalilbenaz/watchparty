<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<style>
  body { width: 290px; margin: 0; font: 14px -apple-system, "Segoe UI", Roboto, sans-serif; background: #14161c; color: #e8eaf0; }
  header { background: linear-gradient(90deg,#6d28d9,#9333ea); padding: 14px 16px; font-weight: 700; font-size: 16px; }
  .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
  label { font-size: 11px; opacity: .7; }
  input { width: 100%; box-sizing: border-box; background: #0e1014; border: 1px solid #2a2e3a; color: #e8eaf0; border-radius: 8px; padding: 9px 10px; outline: none; }
  input:focus { border-color: #9333ea; }
  button { border: 0; border-radius: 8px; padding: 10px; cursor: pointer; font-weight: 600; color: #fff; }
  .primary { background: #9333ea; }
  .ghost { background: #232734; }
  .big { width: 100%; padding: 13px; font-size: 15px; }
  .row { display: flex; gap: 8px; }
  .row input { flex: 1; }
  .row button { flex: 0 0 auto; }
  .sep { text-align: center; font-size: 11px; opacity: .5; }
  .hint { font-size: 11px; opacity: .6; word-break: break-all; }
  .ok { font-size: 13px; color: #34d399; }
</style>
</head>
<body>
  <header>🎬 WatchParty</header>
  <div class="body">
    <div>
      <label>Ton pseudo</label>
      <input id="name" placeholder="Lilou" />
    </div>
    <div id="main"></div>
  </div>
<script src="popup.js"></script>
</body>
</html>
